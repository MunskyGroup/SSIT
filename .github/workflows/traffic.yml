name: Collect GitHub Traffic

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Traffic Data
        env:
          GH_TRAFFIC_TOKEN: ${{ secrets.GH_TRAFFIC_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        run: |
          TOKEN="${GH_TRAFFIC_TOKEN:-$GITHUB_TOKEN_FALLBACK}"
          if [ -z "$TOKEN" ]; then
            echo "Error: no token available. Set GH_TRAFFIC_TOKEN secret or allow github.token." >&2
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/traffic/clones \
            -o clones.json

          curl -fsSL \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/traffic/views \
            -o views.json

      - name: Validate and Merge Traffic Data
        run: |
          node -e '
          const fs = require("fs");
          const clones = JSON.parse(fs.readFileSync("clones.json", "utf8"));
          const views = JSON.parse(fs.readFileSync("views.json", "utf8"));
          if (!Array.isArray(clones.clones)) {
            throw new Error("clones.json missing clones array");
          }
          if (!Array.isArray(views.views)) {
            throw new Error("views.json missing views array");
          }
          fs.mkdirSync("data", { recursive: true });
          const date = new Date().toISOString().slice(0, 10);
          fs.writeFileSync(
            `data/traffic-${date}.json`,
            JSON.stringify({ clones: clones.clones, views: views.views }, null, 2)
          );
          '

      - name: Save Historical Data
        run: |
          rm -f clones.json views.json

      - name: Update README Stats
        run: node scripts/aggregate.js

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update traffic stats" || echo "No changes"
          git push
